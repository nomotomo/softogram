<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <!-- Main cyan to purple gradient -->
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00e5ff"/>
            <stop offset="50%" style="stop-color:#4da6ff"/>
            <stop offset="100%" style="stop-color:#7c3aed"/>
        </linearGradient>
    </defs>

    <!-- Black background -->
    <rect width="100" height="100" fill="#000000"/>

    <!-- Left bracket < -->
    <polyline
            points="35,20 18,50 35,80"
            fill="none"
            stroke="url(#grad)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
    />

    <!-- Right bracket > -->
    <polyline
            points="65,20 82,50 65,80"
            fill="none"
            stroke="url(#grad)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
    />

    <!-- Waveform / heartbeat signal -->
    <polyline
            points="28,50 36,50 40,38 44,62 48,42 52,58 56,44 60,50 68,50"
            fill="none"
            stroke="url(#grad)"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
    />
</svg>
